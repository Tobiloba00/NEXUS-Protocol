/* ─────────────────────────────────────────────────────────
   ADMIN PANEL — Ctrl+Shift+K
   Hidden rebranding console. Lets you instantly change name,
   ticker, network, primary/secondary color, and logo (emoji
   or URL). Supports 3 presets, Reset, Export and Import.
   ───────────────────────────────────────────────────────── */
/* ─────────────────────────────────────────────────────────
   LENTICULAR CARD — pokemon-TCG-style 3D tilt + holographic
   sheen. Mouse position drives rotateX/rotateY plus a moving
   light spot and rainbow band. Touch falls back to a static
   tilt animation so it still feels alive on mobile.
   ───────────────────────────────────────────────────────── */
function LenticularCard({ image, fallbackImage, name, currency, size = 360 }){
  const ref = useRef(null);
  const [tilt, setTilt] = useState({ rx:0, ry:0, mx:50, my:50, active:false });

  const onMove = (e) => {
    const el = ref.current; if(!el) return;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width;
    const y = (e.clientY - r.top)  / r.height;
    setTilt({
      rx: (0.5 - y) * 20,   // tilt back/forward
      ry: (x - 0.5) * 20,   // tilt left/right
      mx: Math.max(0, Math.min(100, x * 100)),
      my: Math.max(0, Math.min(100, y * 100)),
      active: true,
    });
  };
  const onLeave = () => setTilt({ rx:0, ry:0, mx:50, my:50, active:false });

  const shineAngle = tilt.ry * 4 + 110;

  return (
    <div style={{ width: size, perspective: '1200px' }} className="select-none">
      <div
        ref={ref}
        onMouseMove={onMove}
        onMouseLeave={onLeave}
        className="relative overflow-hidden rounded-2xl"
        style={{
          aspectRatio: '1 / 1',
          transform: `rotateX(${tilt.rx}deg) rotateY(${tilt.ry}deg)`,
          transition: tilt.active ? 'transform 60ms linear, box-shadow 200ms ease' : 'transform 500ms cubic-bezier(.2,.7,.3,1), box-shadow 300ms ease',
          transformStyle: 'preserve-3d',
          willChange: 'transform',
          boxShadow: tilt.active
            ? `0 30px 80px -25px rgba(var(--glow), 0.55), 0 0 0 1px rgba(255,255,255,0.10) inset`
            : `0 16px 40px -20px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06) inset`,
        }}
      >
        {/* Blurred backdrop — same image stretched + blurred so the
            card never has bare edges. Solves "low-res image looks
            blurry when upscaled" by keeping the foreground at native
            size and using the haze for richness. */}
        {image && (
          <img
            src={image}
            alt=""
            aria-hidden="true"
            draggable={false}
            className="absolute inset-0 w-full h-full object-cover scale-125"
            style={{ filter: 'blur(28px) saturate(1.5)', opacity: 0.65 }}
            onError={(e)=>{
              if(fallbackImage && e.currentTarget.src !== fallbackImage){
                e.currentTarget.src = fallbackImage;
              }
            }}
          />
        )}
        <div className="absolute inset-0 pointer-events-none" style={{ background: 'rgba(0,0,0,0.10)' }}/>

        {/* Foreground — rendered at NATURAL resolution, centered. */}
        {image ? (
          <div className="absolute inset-0 flex items-center justify-center p-[8%]">
            <img
              src={image}
              alt={name || ''}
              loading="eager"
              decoding="async"
              draggable={false}
              className="max-w-full max-h-full object-contain drop-shadow-2xl"
              style={{ imageRendering: '-webkit-optimize-contrast' }}
              onError={(e)=>{
                if(fallbackImage && e.currentTarget.src !== fallbackImage){
                  e.currentTarget.src = fallbackImage;
                }
              }}
            />
          </div>
        ) : (
          <div className="absolute inset-0 flex items-center justify-center bg-hover text-ink-400">
            <Icon name="image" size={42}/>
          </div>
        )}

        {/* Soft top→bottom shade so the chip and title read on any image */}
        <div className="absolute inset-x-0 top-0 h-1/3 pointer-events-none"
          style={{ background: 'linear-gradient(180deg, rgba(0,0,0,0.45), transparent)' }}/>

        {/* Rainbow holographic band — angle follows tilt */}
        <div className="absolute inset-0 pointer-events-none mix-blend-color-dodge"
          style={{
            background: `linear-gradient(${shineAngle}deg, transparent 35%, rgba(139,92,246,0.30), rgba(34,211,238,0.30), rgba(236,72,153,0.30), transparent 65%)`,
            opacity: tilt.active ? 0.85 : 0.25,
            transition: 'opacity 250ms ease',
          }}/>

        {/* Bright spot that tracks the cursor */}
        <div className="absolute inset-0 pointer-events-none mix-blend-overlay"
          style={{
            background: `radial-gradient(circle at ${tilt.mx}% ${tilt.my}%, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.10) 25%, transparent 45%)`,
            opacity: tilt.active ? 1 : 0,
            transition: 'opacity 250ms ease',
          }}/>

        {/* Subtle scanline / lenticular grid for the "printed card" feel */}
        <div className="absolute inset-0 pointer-events-none mix-blend-overlay opacity-[0.18]"
          style={{
            background: 'repeating-linear-gradient(115deg, rgba(255,255,255,0.10) 0, rgba(255,255,255,0.10) 1px, transparent 1px, transparent 3px)',
          }}/>

        {/* Inner highlight border for depth */}
        <div className="absolute inset-0 pointer-events-none rounded-2xl"
          style={{ boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.14), inset 0 1px 0 rgba(255,255,255,0.30)' }}/>

        {/* Currency chip */}
        {currency && (
          <span className="absolute top-3 left-3 chip backdrop-blur-sm text-[10px]"
            style={{ background:'rgba(0,0,0,0.55)', borderColor:'rgba(255,255,255,0.20)', color:'#fff', transform:'translateZ(20px)' }}>
            {currency}
          </span>
        )}

        {/* Title overlay */}
        {name && (
          <div className="absolute inset-x-0 bottom-0 p-4 pt-12 pointer-events-none"
            style={{
              background:'linear-gradient(to top, rgba(0,0,0,0.80) 10%, transparent)',
              transform:'translateZ(20px)',
            }}>
            <div className="text-white font-semibold text-[16px] tracking-tight truncate">{name}</div>
          </div>
        )}
      </div>

      <div className="text-center text-[11px] text-ink-500 mt-2">Move your cursor across the card</div>
    </div>
  );
}

function AdminPanel(){
  const { showAdmin, setShowAdmin, config, setConfig, resetConfig, pushToast } = useApp();
  const [draft, setDraft] = useState(()=> JSON.parse(JSON.stringify(config)));
  const [panelTab, setPanelTab] = useState('branding');
  const fileRef = useRef(null);
  const livePreviewRef = useRef(false);

  // Whenever the panel reopens, reseed the draft from the current config
  useEffect(()=>{
    if(showAdmin) setDraft(JSON.parse(JSON.stringify(config)));
  }, [showAdmin]);

  // Live-preview brand colors as the user picks them, without committing
  useEffect(()=>{
    if(!showAdmin) return;
    livePreviewRef.current = true;
    applyBrandColors(draft.brand);
    return () => {
      // If the user closes WITHOUT applying, revert the CSS vars to the
      // currently-committed config so the preview doesn't leak.
      if(livePreviewRef.current){
        applyBrandColors(config.brand);
        livePreviewRef.current = false;
      }
    };
  }, [draft.brand?.primary, draft.brand?.secondary, showAdmin]);

  const update = (path, value) => {
    setDraft(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split('.');
      let cur = next;
      for(let i=0; i<keys.length-1; i++){
        cur[keys[i]] = cur[keys[i]] ?? {};
        cur = cur[keys[i]];
      }
      cur[keys[keys.length-1]] = value;
      return next;
    });
  };

  const apply = () => {
    livePreviewRef.current = false; // already applied below
    setConfig(draft);
    pushToast({ kind:'success', title:'Rebrand applied', body:`Now showing as ${draft.name}` });
    setShowAdmin(false);
  };

  const reset = () => {
    resetConfig();
    setDraft({
      ...JSON.parse(JSON.stringify(CONFIG_PRESETS.nexus)),
      features: {
        showNFTs:true, showStaking:true, showGovernance:true, showAnalytics:true,
        showCopyTrading:false, showSecurity:true, showFees:true,
      },
      social: { twitter:"", discord:"", telegram:"", medium:"", github:"" },
    });
    setPanelTab('branding');
    pushToast({ kind:'info', title:'Reset to NEXUS' });
  };

  const loadPreset = (key) => {
    const preset = CONFIG_PRESETS[key];
    if(!preset) return;
    // Presets only carry brand identity — preserve the user's current
    // feature toggles and social links across the swap.
    setDraft(prev => ({
      ...JSON.parse(JSON.stringify(preset)),
      features: prev.features ? { ...prev.features } : {},
      social:   prev.social   ? { ...prev.social   } : {},
    }));
  };

  const exportConfig = () => {
    try {
      const blob = new Blob([JSON.stringify(draft, null, 2)], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${(draft.shortName||'config').toLowerCase()}-config.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      pushToast({ kind:'success', title:'Config exported' });
    } catch (e) {
      pushToast({ kind:'error', title:'Export failed', body: e.message });
    }
  };

  const importConfig = (file) => {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(String(reader.result));
        if(typeof parsed !== 'object' || !parsed) throw new Error('Not a JSON object');
        // Merge against the full current PROJECT_CONFIG so missing nested
        // fields (e.g. a new feature flag the imported file pre-dates)
        // fall back to the live defaults instead of becoming undefined.
        const merged = JSON.parse(JSON.stringify(PROJECT_CONFIG));
        Object.assign(merged, parsed);
        if(parsed.features) merged.features = { ...merged.features, ...parsed.features };
        if(parsed.brand)    merged.brand    = { ...merged.brand,    ...parsed.brand };
        if(parsed.social)   merged.social   = { ...merged.social,   ...parsed.social };
        setDraft(merged);
        pushToast({ kind:'success', title:'Config imported', body: 'Click Apply to commit' });
      } catch (e) {
        pushToast({ kind:'error', title:'Invalid JSON', body: e.message });
      }
    };
    reader.readAsText(file);
  };

  if(!showAdmin) return null;

  const PresetCard = ({ id, label, sub, primary, secondary }) => {
    const active = draft.shortName === CONFIG_PRESETS[id].shortName;
    return (
      <button onClick={()=>loadPreset(id)}
        className={"text-left rounded-xl2 border p-3 transition-all "+(active?'border-line-2':'border-line hover:border-line-2')}
        style={{
          background: active ? `linear-gradient(135deg, ${primary}22, ${secondary}22)` : 'var(--surface)',
        }}>
        <div className="flex items-center justify-between">
          <div className="text-[13px] font-semibold">{label}</div>
          <div className="flex -space-x-1">
            <span className="w-4 h-4 rounded-full ring-2 ring-[var(--surface)]" style={{background:primary}}/>
            <span className="w-4 h-4 rounded-full ring-2 ring-[var(--surface)]" style={{background:secondary}}/>
          </div>
        </div>
        <div className="text-[11px] text-ink-500 mt-1">{sub}</div>
      </button>
    );
  };

  /* Tab content blocks — separated for readability */
  const BrandingTab = (
    <div className="space-y-5">
      {/* Identity fields */}
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label className="text-[11px] uppercase tracking-wider text-ink-500">Project name</label>

            onChange={e=>update('name', e.target.value)} placeholder="NEXUS Protocol"/>

        <div>

            onChange={e=>update('ticker', e.target.value.toUpperCase().slice(0,8))} placeholder="NXS"/>
        </div>
        <div>
          <label className="text-[11px] uppercase tracking-wider text-ink-500">Network</label>
          <select className="input mt-1" value={draft.network||'Solana'}
            onChange={e=>update('network', e.target.value)}>
            {SUPPORTED_NETWORKS.map(n => <option key={n}>{n}</option>)}
          </select>
        </div>
        <div>
          <label className="text-[11px] uppercase tracking-wider text-ink-500">Short slug</label>
          <input className="input mt-1 font-mono" value={draft.shortName||''}
            onChange={e=>update('shortName', e.target.value.toLowerCase().replace(/[^a-z0-9-]/g,''))} placeholder="nexus"/>
        </div>
      </div>

      {/* Brand colors + logo */}
      <div>
        <div className="text-[11px] uppercase tracking-wider text-ink-500 mb-2">Brand</div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div className="flex items-center gap-3">
            <input type="color" value={draft.brand?.primary || '#8b5cf6'}
              onChange={e=>update('brand.primary', e.target.value)}
              className="w-12 h-10 rounded-lg border border-line bg-transparent cursor-pointer flex-shrink-0"
              title="Primary color"/>
            <div className="flex-1 min-w-0">
              <div className="text-[12px]">Primary</div>
              <input className="input mt-1 font-mono text-[12px]" value={draft.brand?.primary || ''}
                onChange={e=>update('brand.primary', e.target.value)} placeholder="#8b5cf6"/>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <input type="color" value={draft.brand?.secondary || '#22d3ee'}
              onChange={e=>update('brand.secondary', e.target.value)}
              className="w-12 h-10 rounded-lg border border-line bg-transparent cursor-pointer flex-shrink-0"
              title="Secondary color"/>
            <div className="flex-1 min-w-0">
              <div className="text-[12px]">Secondary</div>
              <input className="input mt-1 font-mono text-[12px]" value={draft.brand?.secondary || ''}
                onChange={e=>update('brand.secondary', e.target.value)} placeholder="#22d3ee"/>
            </div>
          </div>
        </div>
        <div className="mt-3">
          <label className="text-[12px]">Logo override</label>
          <div className="text-[11px] text-ink-500 mb-1">Emoji (⏳, 📈, etc.) or full image URL. Leave empty for the default N mark.</div>
          <div className="flex items-center gap-2">
            <input className="input flex-1" value={draft.brand?.logo || ''}
              onChange={e=>update('brand.logo', e.target.value)}
              placeholder="📈 or https://…"/>
            <div className="w-12 h-12 rounded-xl2 bg-surface border border-line flex items-center justify-center flex-shrink-0 overflow-hidden">
              {(()=>{
                const l = draft.brand?.logo || '';
                if(!l) return <span className="text-ink-500 text-[10px]">N</span>;
                if(/^(https?:|\/|data:)/i.test(l))
                  return <img src={l} alt="" className="w-full h-full object-cover" onError={e=>{e.currentTarget.style.display='none';}}/>;
                return (
                  <span style={{
                    display:'inline-flex', alignItems:'center', justifyContent:'center',
                    width:'100%', height:'100%',
                    background:'linear-gradient(135deg, var(--accent), var(--accent-2))',
                    fontSize:24, color:'#fff',
                  }}>{l}</span>
                );
              })()}
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  const FeaturesTab = (
    <div>
      <div className="text-[12px] text-ink-400 mb-3 leading-relaxed">
        Toggle modules on or off — disabled features are pruned from the sidebar and their routes redirect to the dashboard. Use this to ship a leaner UI for early-stage protocols or A/B test before rollout.

        {FEATURE_FLAGS.map(f => {

          <div className="flex items-center gap-1 px-1">
            {[

            ].map(t => (

function StakeModal(){
  const { activeStakeModal, setActiveStakeModal, pushToast } = useApp();
  const [amount, setAmount] = useState(500);
  const [lock, setLock] = useState(0);
  if(!activeStakeModal) return null;
  const pool = activeStakeModal;
  const mul = 1 + Math.min(lock/365, 1) * (pool.maxMul - pool.minMul);
  const apr = pool.apr * mul / pool.minMul;
  const projected = amount * (apr/100) * Math.max(lock,1)/365;
  return (
    <Modal open onClose={()=>setActiveStakeModal(null)} title={"Stake — "+pool.name}>
      <div className="space-y-3">
        <div className="surface p-3">
          <div className="text-[11px] text-ink-500 uppercase tracking-wider">Amount ({pool.symbol})</div>

/* ─────────────────────────────────────────────────────────
   TRADINGVIEW LIGHTWEIGHT CHARTS — real OHLC + volume widget.
   Mounts once, accepts coin/days props for re-fetching. Reads
   theme colors from CSS vars and re-creates the chart when the
   theme changes so light/dark stays correct. ResizeObserver
   keeps it sized to its container.
   ───────────────────────────────────────────────────────── */
function TradingViewChart(){
  const { theme } = useApp();
  const containerRef = useRef(null);
  const chartRef = useRef(null);
  const candleRef = useRef(null);
  const volRef = useRef(null);

  const [coin, setCoin] = useState(TV_COINS[0]);
  const [days, setDays] = useState(30);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [hover, setHover] = useState(null);
  const [lastCandle, setLastCandle] = useState(null);
  const [stats, setStats] = useState({ change: 0, high: 0, low: 0, vol: 0 });

  // (Re-)create the chart whenever the resolved theme flips
  useEffect(()=>{
    const LWC = window.LightweightCharts;
    if(!LWC){
      setError('Lightweight Charts library failed to load');
      return;
    }
    if(!containerRef.current) return;

    const styles = getComputedStyle(document.documentElement);
    const ink300 = styles.getPropertyValue('--ink-300').trim() || '#9aa3b8';
    const ink500 = styles.getPropertyValue('--ink-500').trim() || '#5b6478';
    const gridLine = styles.getPropertyValue('--chart-grid').trim() || 'rgba(255,255,255,0.05)';

    const chart = LWC.createChart(containerRef.current, {
      width: containerRef.current.clientWidth,
      height: containerRef.current.clientHeight,
      layout: {
        background: { type: 'solid', color: 'transparent' },
        textColor: ink300,
        fontFamily: 'Inter, system-ui, sans-serif',
        fontSize: 11,
      },
      grid: {
        vertLines: { color: gridLine },
        horzLines: { color: gridLine },
      },
      crosshair: {
        mode: LWC.CrosshairMode.Normal,
        vertLine: { color: 'rgba(139,92,246,0.45)', width: 1, style: 0, labelBackgroundColor: '#8b5cf6' },
        horzLine: { color: 'rgba(139,92,246,0.45)', width: 1, style: 0, labelBackgroundColor: '#8b5cf6' },
      },
      timeScale: {
        borderColor: gridLine,
        timeVisible: true,
        secondsVisible: false,
        rightOffset: 4,
      },
      rightPriceScale: {
        borderColor: gridLine,
        scaleMargins: { top: 0.08, bottom: 0.28 },
      },
      autoSize: false,
    });
    chartRef.current = chart;

    const candle = chart.addCandlestickSeries({
      upColor:         '#10b981',
      downColor:       '#ef4444',
      borderUpColor:   '#10b981',
      borderDownColor: '#ef4444',
      wickUpColor:     '#10b981',
      wickDownColor:   '#ef4444',
      priceLineColor:  'rgba(139,92,246,0.4)',
      priceLineStyle:  2,
    });
    candleRef.current = candle;

    const vol = chart.addHistogramSeries({
      priceFormat: { type: 'volume' },
      priceScaleId: 'vol',
    });
    vol.priceScale().applyOptions({ scaleMargins: { top: 0.78, bottom: 0 } });
    volRef.current = vol;

    // Crosshair → drive the OHLC strip above the chart
    chart.subscribeCrosshairMove(param => {
      if(!param?.time || !param?.seriesData?.size){
        setHover(null);
        return;
      }
      const c = param.seriesData.get(candle);
      const v = param.seriesData.get(vol);
      if(c) setHover({ ...c, volume: v?.value });
    });

    // Keep chart sized to its container
    const ro = new ResizeObserver(entries => {
      for(const entry of entries){
        const { width, height } = entry.contentRect;
        if(width > 0 && height > 0){
          chart.applyOptions({ width, height });
        }
      }
    });
    ro.observe(containerRef.current);

    return () => {
      ro.disconnect();
      try { chart.remove(); } catch(_){}
      chartRef.current = null;
      candleRef.current = null;
      volRef.current = null;
    };
  }, [theme?.resolved]);

  // Load OHLC + volume on coin/timeframe change
  useEffect(()=>{
    if(!candleRef.current || !volRef.current) return;
    let cancelled = false;
    setLoading(true);
    setError(null);

    Promise.all([
      fetchOhlc(coin.id, days),
      fetchOhlcVolumes(coin.id, days),
    ]).then(([ohlc, volumes]) => {
      if(cancelled) return;
      if(!ohlc || ohlc.length === 0){
        setError('No OHLC data available for this asset/timeframe');
        setLoading(false);
        return;
      }
      const candles = ohlc.map(([t,o,h,l,c]) => ({
        time: Math.floor(t/1000),
        open: o, high: h, low: l, close: c,
      }));
      candleRef.current.setData(candles);

      const aligned = alignVolumesToCandles(candles, volumes || []);
      volRef.current.setData(aligned);

      // Derive header stats
      const first = candles[0];
      const last  = candles[candles.length-1];
      const highs = candles.map(c => c.high);
      const lows  = candles.map(c => c.low);
      const change = first ? ((last.close - first.open) / first.open) * 100 : 0;
      setStats({
        change,
        high: Math.max(...highs),
        low:  Math.min(...lows),
        vol:  aligned.reduce((s, v) => s + v.value, 0),
      });
      setLastCandle(last);

      chartRef.current?.timeScale().fitContent();
      setLoading(false);
    }).catch(e => {
      if(!cancelled){
        setError(e?.message || 'Failed to load chart data');
        setLoading(false);
      }
    });

    return () => { cancelled = true; };
  }, [coin.id, days, theme?.resolved]);

  const fmtPrice = (n) => fmt.usd(n, n < 10 ? 4 : 2);
  const currentPrice = hover?.close ?? lastCandle?.close;
  const changeIsUp = stats.change >= 0;

  return (
    <div className="surface p-4 sm:p-5">
      {/* Header row: token + price + coin/timeframe selectors */}
      <div className="flex items-start justify-between gap-3 mb-3 flex-wrap">

            {currentPrice != null && (
              <div className="flex items-baseline gap-2 mt-1">
                <span className="text-[22px] font-semibold tnum num text-glow">{fmtPrice(currentPrice)}</span>
                {!hover && (
                  <span className={"text-[12px] tnum "+(changeIsUp?"text-pos":"text-neg")}>
                    {fmt.pct(stats.change, 2)}

                <span className="text-[10px] text-ink-500 uppercase tracking-wider">
                  {TV_TIMEFRAMES.find(t=>t.days===days)?.label}

        <div className="flex flex-wrap items-center gap-2">
          <select value={coin.id} onChange={e=>setCoin(TV_COINS.find(c=>c.id===e.target.value)||TV_COINS[0])}

      </div>

      {/* OHLCV strip — driven by crosshair hover, else summary stats */}
      <div className="flex flex-wrap items-center gap-x-4 gap-y-1 mb-3 text-[11px] font-mono">
        {hover ? (

function TransactionsTable(){
  const all = useMemo(()=> Array.from({length: 60}, (_,i)=>genTx(i+200)), []);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("All");
  const [sort, setSort] = useState({ key:"time", dir:-1 });
  const filtered = useMemo(()=>{
    let arr = all.filter(t => filter==='All' || t.type===filter)
                 .filter(t => !search || t.from.includes(search) || t.to.includes(search) || t.tokenA.symbol.toLowerCase().includes(search.toLowerCase()));
    arr = arr.slice().sort((a,b)=> {
      const x = sort.key==='time'? a.time-b.time : sort.key==='amount'? a.amount-b.amount : sort.key==='usd'? a.usd-b.usd : 0;
      return x * sort.dir;
    });
    return arr.slice(0, 12);
  }, [all, filter, search, sort]);
  const SortBtn = ({k, label}) => (
    <button className="text-[10px] uppercase tracking-wider text-ink-500 hover:text-ink-50 inline-flex items-center gap-1"
      onClick={()=>setSort(s=>({key:k, dir:s.key===k?-s.dir:-1}))}>
      {label}{sort.key===k && <span>{sort.dir>0?'↑':'↓'}</span>}
    </button>
  );
  return (
    <div className="surface">
      <div className="flex flex-wrap items-center justify-between gap-2 px-4 sm:px-5 py-3 border-b border-line">
        <h3 className="text-[14px] font-semibold">Transactions</h3>
        <div className="flex flex-wrap gap-2">
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search" className="input w-44 sm:w-64 text-[13px] py-1.5"/>
          <select value={filter} onChange={e=>setFilter(e.target.value)} className="input w-28 text-[13px] py-1.5">
            <option>All</option>
            {TX_TYPES.map(t=>(<option key={t}>{t}</option>))}
          </select>
        </div>
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-[12px]">
          <thead>
            <tr>
              <th className="text-left font-normal py-2 pl-4 sm:pl-5"><span className="text-[10px] uppercase tracking-wider text-ink-500">Type</span></th>
              <th className="text-left font-normal py-2 hidden sm:table-cell"><span className="text-[10px] uppercase tracking-wider text-ink-500">From</span></th>
              <th className="text-left font-normal py-2 hidden md:table-cell"><span className="text-[10px] uppercase tracking-wider text-ink-500">To</span></th>
              <th className="text-right font-normal py-2"><SortBtn k="amount" label="Amount"/></th>
              <th className="text-right font-normal py-2 hidden sm:table-cell"><SortBtn k="usd" label="Value"/></th>
              <th className="text-right font-normal py-2 pr-4 sm:pr-5"><SortBtn k="time" label="Time"/></th>
            </tr>
          </thead>
          <tbody>
          {filtered.map(tx => (
            <tr key={tx.id} className="row-hover border-t border-line">
              <td className="py-2 pl-4 sm:pl-5 font-medium">{tx.type}</td>
              <td className="py-2 font-mono text-ink-300 hidden sm:table-cell">{fmt.short(tx.from,4,4)}</td>
              <td className="py-2 font-mono text-ink-300 hidden md:table-cell">{fmt.short(tx.to,4,4)}</td>
              <td className="py-2 text-right font-mono">{fmt.compact(tx.amount)} {tx.tokenA.symbol}</td>
              <td className="py-2 text-right font-mono text-ink-400 hidden sm:table-cell">{fmt.usd(tx.usd,0)}</td>

            </tr>
          ))}

        </table>
      </div>
    </div>
  );
}

function TxModal(){
  const { activeTxModal, setActiveTxModal, pushToast } = useApp();
  const [step, setStep] = useState("review");
  useEffect(()=>{ setStep("review"); }, [activeTxModal]);
  if(!activeTxModal) return null;
  const t = activeTxModal;
  const Row = ({k,v}) => <div className="flex justify-between text-[13px] py-1.5"><span className="text-ink-500">{k}</span><span className="font-mono text-ink-100">{v}</span></div>;
  const confirm = () => {
    setStep("signing");
    setTimeout(()=>{
      setStep("success");
      setTimeout(()=>{
        setActiveTxModal(null);
        pushToast({kind:'success', title:'Transaction confirmed', body: t.type+' '+(t.token?.symbol||'')+(t.nft?' · '+t.nft.name:'')});
      }, 900);
    }, 1100);
  };
  return (
    <Modal open onClose={()=>setActiveTxModal(null)} title={"Confirm "+t.type}>
      {step==='review' && (
        <div className="space-y-3">
          <div className="surface p-3">
            <Row k="Action" v={t.type}/>
            <Row k="Asset" v={t.token?.symbol || '—'}/>
            <Row k="Amount" v={t.nft? t.amount + ' SOL' : fmt.num(t.amount,2)+' '+(t.token?.symbol||'')}/>
            {t.nft && <Row k="NFT" v={t.nft.name}/>}
            <Row k="Network" v={PROJECT_CONFIG.network}/>
            <Row k="Network fee" v="~0.00012 SOL"/>
            <Row k="Slippage" v="0.5%"/>
          </div>
          <p className="text-[10px] text-ink-500 text-center">Verify the destination. Transactions are final once signed.</p>
          <div className="flex gap-2">
            <button onClick={()=>setActiveTxModal(null)} className="flex-1 btn btn-secondary justify-center">Cancel</button>
            <button onClick={confirm} className="flex-1 btn btn-primary justify-center">Confirm</button>
          </div>
        </div>
      )}
      {step==='signing' && (
        <div className="py-12 text-center">
          <div className="inline-block w-9 h-9 rounded-full border-2 border-line border-t-accent animate-spin"/>
          <div className="text-[13px] mt-3 text-ink-300">Awaiting signature…</div>
        </div>
      )}
      {step==='success' && (
        <div className="py-10 text-center">
          <div className="inline-flex w-12 h-12 rounded-full items-center justify-center" style={{background:'rgba(16,185,129,0.15)'}}>
            <Icon name="check" size={22} className="text-pos"/>
          </div>
          <div className="text-[15px] font-semibold mt-2">Transaction sent</div>
          <div className="text-[11px] text-ink-500 mt-1 font-mono">{("0x"+(Math.random()*1e16|0).toString(16)).slice(0,18)}…</div>
        </div>
      )}
    </Modal>
  );
}

              Volume-tiered, no hidden spreads, no inactivity fees. Pay less as you trade more — the rate steps down automatically based on your 30-day rolling volume.
            </p>
          </div>
          <div className="surface px-4 py-3 text-center min-w-[180px]">
            <div className="text-[10px] uppercase tracking-wider text-ink-500">Your tier</div>
            <div className="text-[18px] font-semibold mt-1">Standard</div>
            <div className="text-[11px] text-ink-400 mt-0.5">Trade $50K to upgrade</div>
          </div>
        </div>
      </div>

      {/* Trading fees table */}
      <div className="surface">
        <div className="flex items-center justify-between gap-2 px-5 py-3.5 border-b border-line">
          <div>
            <h2 className="text-[15px] font-semibold tracking-tight">Trading fees</h2>
            <p className="text-[11px] text-ink-400 mt-0.5">Spot trading · per-trade fee based on 30-day rolling volume in USD.</p>
          </div>
          <span className="chip"><Icon name="info" size={11}/> Updated daily</span>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-[13px]">
            <thead>
              <tr className="text-[10px] uppercase tracking-wider text-ink-500">
                <th className="text-left font-normal py-2.5 pl-5">Tier</th>
                <th className="text-left font-normal py-2.5">30-day volume</th>
                <th className="text-right font-normal py-2.5">Maker</th>
                <th className="text-right font-normal py-2.5 pr-5">Taker</th>
              </tr>
            </thead>
            <tbody>
              {TRADING_TIERS.map((t,i)=>(
                <tr key={i} className={"row-hover border-t border-line "+(t.tier==='VIP'?'bg-[var(--primary-soft)]':'')}>
                  <td className="py-3 pl-5">
                    <div className="flex items-center gap-2">
                      <span className="text-[13px] font-medium">{t.tier}</span>
                      {t.tier==='VIP' && <span className="chip chip-accent text-[9px]"><Icon name="crown" size={10}/> Best rate</span>}
                    </div>
                  </td>
                  <td className="py-3 text-ink-200 font-mono text-[12px]">{t.vol}</td>
                  <td className="py-3 text-right font-mono text-pos">{t.maker}</td>
                  <td className="py-3 pr-5 text-right font-mono">{t.taker}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="px-5 py-3 border-t border-line text-[11px] text-ink-500">
          Maker orders add liquidity to the book and earn the lower fee. Taker orders cross the spread and remove liquidity.
        </div>
      </div>

      {/* Network fees + Staking side-by-side on desktop */}
      <div className="grid grid-cols-1 lg:grid-cols-5 gap-3 sm:gap-4">
        <div className="surface lg:col-span-3">
          <div className="px-5 py-3.5 border-b border-line">
            <h2 className="text-[15px] font-semibold tracking-tight">Withdrawal fees</h2>
            <p className="text-[11px] text-ink-400 mt-0.5">Pass-through network gas plus a small protocol fee where applicable. No fixed minimums.</p>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-[13px]">
              <thead>
                <tr className="text-[10px] uppercase tracking-wider text-ink-500">
                  <th className="text-left font-normal py-2.5 pl-5">Network</th>
                  <th className="text-left font-normal py-2.5 hidden sm:table-cell">Asset</th>
                  <th className="text-right font-normal py-2.5">Fee</th>
                  <th className="text-left font-normal py-2.5 pl-4 pr-5 hidden md:table-cell">Notes</th>
                </tr>
              </thead>
              <tbody>
                {NETWORK_FEES.map((n,i)=>(
                  <tr key={i} className="row-hover border-t border-line">
                    <td className="py-3 pl-5 font-medium">{n.network}</td>
                    <td className="py-3 font-mono text-ink-300 hidden sm:table-cell">{n.sym}</td>
                    <td className="py-3 text-right font-mono">{n.fee}</td>
                    <td className="py-3 pl-4 pr-5 text-ink-400 text-[12px] hidden md:table-cell">{n.note}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <div className="surface lg:col-span-2 p-5">
          <div className="flex items-center gap-2 mb-2">
            <span className="w-9 h-9 rounded-xl flex items-center justify-center"
              style={{ background:'rgba(16,185,129,0.15)', color:'var(--pos)' }}>
              <Icon name="trending-up" size={18}/>
            </span>
            <h2 className="text-[15px] font-semibold tracking-tight">Staking rewards</h2>
          </div>
          <p className="text-[12px] text-ink-400 mb-3">Earn protocol revenue by locking {PROJECT_CONFIG.ticker} or LP positions.</p>
          <div className="space-y-2">
            <div className="flex items-center justify-between text-[13px]"><span className="text-ink-300">Flexible (no lock)</span><span className="font-mono text-pos">8.4% APR</span></div>
            <div className="flex items-center justify-between text-[13px]"><span className="text-ink-300">30-day lock</span><span className="font-mono text-pos">11.2% APR</span></div>
            <div className="flex items-center justify-between text-[13px]"><span className="text-ink-300">90-day lock</span><span className="font-mono text-pos">14.6% APR</span></div>
            <div className="flex items-center justify-between text-[13px]"><span className="text-ink-300">365-day lock</span><span className="font-mono text-pos">18.0% APR</span></div>
          </div>
          <Link to="/staking" className="w-full btn btn-secondary text-[12.5px] justify-center mt-4">
            Explore staking pools <Icon name="arrow-right" size={12}/>
          </Link>
        </div>
      </div>

      {/* VIP program */}
      <div className="surface p-5 sm:p-6 relative overflow-hidden">
        <div className="absolute inset-0 pointer-events-none" style={{
          background:'linear-gradient(135deg, rgba(var(--glow),0.10) 0%, transparent 50%), radial-gradient(500px 200px at 100% 0%, rgba(var(--glow-2),0.10), transparent 60%)'
        }}/>
        <div className="relative grid grid-cols-1 md:grid-cols-[1fr_auto] items-start gap-5">
          <div>
            <span className="chip chip-accent inline-flex"><Icon name="crown" size={11}/> VIP program</span>
            <h2 className="text-[20px] sm:text-[22px] font-semibold tracking-tight mt-2">Custom rates for high-volume traders</h2>
            <p className="text-[13px] text-ink-300 mt-2 max-w-2xl leading-relaxed">
              Beyond the public schedule, qualified market makers and institutions get bespoke fee arrangements, dedicated support, and direct API access.
            </p>
            <ul className="mt-4 space-y-1.5 text-[13px]">
              {[
                "Maker rebates from -0.01%",
                "Dedicated Telegram channel + Slack Connect",
                "Higher rate limits + private order routing",
                "Custodial integrations (Fireblocks, Copper, BitGo)",
              ].map((line,i)=>(
                <li key={i} className="flex items-center gap-2 text-ink-200">
                  <Icon name="check" size={13} className="text-pos flex-shrink-0"/>
                  {line}
                </li>
              ))}
            </ul>
          </div>
          <button onClick={()=>pushToast({kind:'success', title:'Application received', body:'A trading team member will reach out within 24 hours.'})}
            className="btn btn-primary text-[13px] self-start">
            <Icon name="send" size={14}/> Apply for VIP
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────
   FOOTER — minimal two-row layout (dashboard pattern, not
   marketing-site columns). Brand + key links + status +
   social on row 1; copyright + legal links on row 2.
   ───────────────────────────────────────────────────────── */
function Footer(){
  const { config, marketStatus } = useApp();
  const year = new Date().getFullYear();
  const live = marketStatus?.source === 'live';
  const f = config.features || {};
  const s = config.social || {};
  const social = SOCIAL_FIELDS.filter(x => s[x.key]);

  const linkCls = "text-[12px] text-ink-400 hover:text-ink-50 transition-colors whitespace-nowrap";
  return (
    <footer className="border-t border-line bg-surface mt-8">
      <div className="max-w-[1500px] mx-auto px-4 sm:px-6 py-4 sm:py-5">
        <div className="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-5">
          <Link to="/" className="flex items-center gap-2 flex-shrink-0">
            <NexusLogo size={22}/>
            <span className="font-semibold text-[13px] tracking-tight">{config.name}</span>
            <span className="text-[11px] text-ink-500 hidden sm:inline">· {config.network}</span>
          </Link>

          <nav className="flex items-center gap-x-4 gap-y-1 flex-wrap text-[12px]">
            {f.showSecurity && <Link to="/security" className={linkCls}>Security</Link>}
            {f.showFees     && <Link to="/fees"     className={linkCls}>Fees</Link>}
            {s.github       && <a href={s.github} target="_blank" rel="noreferrer" className={linkCls}>GitHub</a>}
            <a href={"mailto:support@"+config.shortName+".io"} className={linkCls}>Support</a>
          </nav>

          <div className="flex items-center gap-2 ml-auto">
            {live && (
              <span className="chip chip-pos text-[10px]" title="CoinGecko live data">
                <span className="dot pulse"/> Live
              </span>
            )}
            {social.length > 0 && (
              <div className="flex items-center gap-1">
                {social.map(x => (
                  <a key={x.key} href={s[x.key]} target="_blank" rel="noreferrer"
                    title={x.label}
                    className="w-7 h-7 rounded-full border border-line hover:bg-hover flex items-center justify-center text-ink-400 hover:text-ink-50 transition-colors">
                    <Icon name={x.icon} size={12}/>
                  </a>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="mt-3 pt-3 border-t border-line flex flex-col sm:flex-row sm:items-center justify-between gap-2 text-[11px] text-ink-500">
          <div>© {year} {config.name}. Not financial advice — DYOR.</div>
          <div className="flex items-center gap-x-4 flex-wrap">
            <Link to="/security" className="hover:text-ink-300">Terms</Link>
            <Link to="/security" className="hover:text-ink-300">Privacy</Link>
            <Link to="/security" className="hover:text-ink-300">Risk Disclosure</Link>
          </div>
        </div>
      </div>
    </footer>
  );
}

/* ─────────────────────────────────────────────────────────
   SHELL & ROUTER
   ───────────────────────────────────────────────────────── */
function Shell(){
  const { sidebarCollapsed } = useApp();
  const loc = useLocation();
  useEffect(()=>{ window.scrollTo(0,0); }, [loc.pathname]);
  return (
    <div className="min-h-screen">
      <Sidebar/>
      {/* Column flex so the footer sticks to the bottom on short pages,
          and the pb-24 below the footer keeps the mobile bottom-tabs
          from covering anything. */}
      <div className={"flex flex-col min-h-screen transition-[padding] pb-24 lg:pb-0 "+(sidebarCollapsed?"lg:pl-[68px]":"lg:pl-[238px]")}>
        <Header/>
        <main className="flex-1 w-full px-3 sm:px-5 py-4 sm:py-6 max-w-[1500px] mx-auto">
          <Outlet/>
        </main>
        <Footer/>
      </div>
      <MobileTabs/>
      <WalletModal/>
      <SearchModal/>
      <NFTDetailModal/>
      <CollectionDetailModal/>
      <StakeModal/>
      <TxModal/>
      <AdminPanel/>
      <ToastHost/>
    </div>
  );
}

/* Routes live inside their own component so they re-evaluate when
   admin-panel feature toggles flip — disabled features get pruned
   from the route table and the catch-all redirects to /. */
function AppRoutes(){
  const { config } = useApp();
  const f = config.features || {};
  return (
    <Routes>
      <Route element={<Shell/>}>
        <Route path="/" element={<MarketsPage/>}/>
        {f.showNFTs       && <Route path="/marketplace" element={<MarketplacePage/>}/>}
        {f.showStaking    && <Route path="/staking"     element={<StakingPage/>}/>}
        {f.showGovernance && <Route path="/governance"  element={<GovernancePage/>}/>}
        {f.showAnalytics  && <Route path="/analytics"   element={<AnalyticsPage/>}/>}
        {f.showSecurity   && <Route path="/security"    element={<SecurityPage/>}/>}
        {f.showFees       && <Route path="/fees"        element={<FeesPage/>}/>}
        <Route path="/profile" element={<ProfilePage/>}/>
        <Route path="*" element={<MarketsPage/>}/>
      </Route>
    </Routes>
  );
}

function App(){
  return (
    <AppProvider>
      <HashRouter>
        <AppRoutes/>
      </HashRouter>
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
